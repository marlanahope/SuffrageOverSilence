<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suffrage Over Silence</title>

  <link rel="icon" type="image/png" href="SOS-Logo-Square-Box.png">

  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    :root {
      --blue: #0F4C81;
      --red: #CD212A;
      --gold: #FFA500;
      --gray: #A09998;
      --navy: #282D3C;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--white);
      color: var(--navy);
      font-family: "Open Sans", Arial, sans-serif;
      min-height: 100vh;
    }

    main {
      min-height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .content {
      width: min(900px, 100%);
    }

    .logo {
      width: min(760px, 92vw);
      height: auto;
      display: block;
      margin: 0 auto 54px;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin: 0 auto 48px;
      color: var(--gold);
    }

    .divider::before,
    .divider::after {
      content: "";
      display: block;
      width: 220px;
      max-width: 28vw;
      height: 2px;
      background: var(--gold);
    }

    .star {
      font-size: 30px;
      line-height: 1;
      color: var(--gold);
    }

    .socials {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 42px;
      flex-wrap: wrap;
      font-family: "Open Sans", Arial, sans-serif;
      font-size: 18px;
    }

    .social {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--navy);
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .social:hover {
      opacity: 0.7;
    }

    .icon {
      width: 44px;
      height: 44px;
      border: 2px solid var(--red);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--red);
      font-family: "Raleway", Arial, sans-serif;
      font-weight: 700;
      font-size: 22px;
    }
   .icon i {
    font-size: 22px;
   }

    .vertical-line {
      width: 1px;
      height: 52px;
      background: var(--gray);
      opacity: 0.45;
    }

    footer {
      min-height: 120px;
      background: var(--navy);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      font-family: "Raleway", Arial, sans-serif;
      letter-spacing: 5px;
      font-size: 14px;
      text-transform: uppercase;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      flex-wrap: wrap;
      text-align: center;
    }

    .footer-line {
      width: 120px;
      height: 2px;
      background: var(--gold);
    }

    .footer-star {
      color: var(--gold);
      font-size: 22px;
      letter-spacing: 0;
    }

    @media (max-width: 700px) {
      main {
        min-height: calc(100vh - 110px);
        padding: 36px 18px;
      }

      .logo {
        margin-bottom: 42px;
      }

      .divider {
        margin-bottom: 36px;
        gap: 16px;
      }

      .socials {
        flex-direction: column;
        gap: 22px;
        font-size: 16px;
      }

      .vertical-line {
        display: none;
      }

      footer {
        min-height: 110px;
        font-size: 11px;
        letter-spacing: 3px;
      }

      .footer-line {
        width: 70px;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="content">
      <img class="logo" src="SOS_logo_Transparent.png" alt="Suffrage Over Silence logo" />

      <div class="divider">
        <span class="star">★</span>
      </div>

      <div class="socials">
        <a class="social" href="https://www.instagram.com/SuffrageOverSilence" target="_blank" rel="noopener">
          <span class="icon"><i class="fa-brands fa-instagram"></i></span>
          <span>@SuffrageOverSilence</span>
        </a>

        <div class="vertical-line"></div>

        <a class="social" href="https://www.facebook.com/SuffrageOverSilence" target="_blank" rel="noopener">
          <span class="icon"><i class="fa-brands fa-facebook-f"></i></span>
          <span>@SuffrageOverSilence</span>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <span class="footer-line"></span>
      <span class="footer-star">★</span>
      <span>© 2026 Suffrage Over Silence</span>
      <span class="footer-star">★</span>
      <span class="footer-line"></span>
    </div>
  </footer>
</body>
</html>
